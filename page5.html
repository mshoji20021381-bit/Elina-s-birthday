<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>آرزو</title>

<style>
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:sans-serif;
  background: radial-gradient(circle at top, #120018, #000);
  color:white;
}

/* مرکز صفحه */
.wrap{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  box-sizing:border-box;
}

/* متن */
.text{
  max-width:650px;
  font-size:18px;
  line-height:1.8;
  opacity:0;
  transform:translateY(15px);
  transition:2s;
  text-shadow:0 0 12px rgba(168,85,247,0.4);
}

/* دکمه */
.btn{
  position:absolute;
  bottom:60px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 22px;
  border:1px solid white;
  background:transparent;
  color:white;
  border-radius:25px;
}
</style>
</head>

<body>

<div class="wrap">
  <div class="text" id="t">

اگر از تمام دنیا فقط یک آرزو داشته باشم...<br><br>

آرزو می‌کنم هیچ روزی از زندگی‌ات بی‌لبخند نگذرد.<br>
آرزو می‌کنم قلبت هیچ‌وقت خسته نشود.<br>
آرزو می‌کنم هر جا رفتی، آرامش همراهت باشد.<br>

  </div>
</div>

<button class="btn" onclick="next()">✨ ادامه</button>

<script>

setTimeout(()=>{
  let t=document.getElementById("t");
  t.style.opacity=1;
  t.style.transform="translateY(0)";
},600);

function next(){
  window.location.href="page6.html";
}

</script>

</body>
</html>
