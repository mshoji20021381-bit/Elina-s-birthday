<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صفحه ۶</title>

<style>
html,body{
  margin:0;
  padding:0;
  height:100%;
  width:100%;
  overflow:hidden;
  font-family:sans-serif;
  background: radial-gradient(circle at center, #0b0014, #000);
  color:white;
}

/* نور بنفش */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background: radial-gradient(circle at top, rgba(140,0,255,0.25), transparent 60%);
}

/* کل صفحه */
.container{
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  box-sizing:border-box;
}

/* متن */
.text{
  max-width:700px;
  font-size:18px;
  line-height:1.9;
  text-shadow:0 0 15px rgba(168,85,247,0.35);
}

/* اسم */
.name{
  margin-top:15px;
  font-size:38px;
  color:#d7c2ff;
  text-shadow:0 0 25px #6fa8ff;
}

/* کیک */
.cake{
  margin-top:40px;
  font-size:100px;
  position:relative;
}

/* شمع */
.candle{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  font-size:28px;
  cursor:pointer;
  animation:flicker 1s infinite;
}

/* flicker */
@keyframes flicker{
  0%{opacity:1;}
  50%{opacity:0.5;}
  100%{opacity:1;}
}

/* خاموش شدن */
.out{
  opacity:0.2;
}
</style>
</head>

<body>

<div class="container">

  <div class="text">

این فقط یک سایت نبود...<br>
این یک تولد بود، در شکلِ کلمه‌ها.<br><br>

برای دختری که شاید خودش نداند<br>
چقدر در نگاه یک نفر خاص است.

  </div>

  <div class="name">ELINA 🍓💜</div>

  <div class="cake">
    🎂
    <div class="candle" onclick="blow()">🕯️</div>
  </div>

</div>

<script>
function blow(){
  const c = document.querySelector(".candle");

  c.innerHTML = "💨";
  c.classList.add("out");

  setTimeout(()=>{
    c.innerHTML = "✨";
  },1200);
}
</script>

</body>
</html>
