<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>باغ توت‌فرنگی</title>

<style>
html, body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:sans-serif;
  background:#050008;
}

/* فضای باغ */
.sky{
  position:relative;
  width:100%;
  height:100%;
}

/* 🌳 درخت‌ها */
.tree{
  position:absolute;
  bottom:0;
  font-size:60px;
  opacity:0.9;
  filter: drop-shadow(0 0 10px #3b1a5a);
}

/* 🍓 توت‌فرنگی */
.berry{
  position:absolute;
  font-size:22px;
  cursor:pointer;
  animation:float 4s infinite ease-in-out;
  filter: drop-shadow(0 0 8px #ff4d6d);
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-20px);}
  100%{transform:translateY(0);}
}

/* متن */
.title{
  position:absolute;
  width:100%;
  text-align:center;
  top:40%;
  color:#f5eaff;
  font-size:20px;
  opacity:0;
  transition:1.2s;
  text-shadow:0 0 10px #a855f7;
}

/* دکمه */
.btn{
  position:absolute;
  bottom:60px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 22px;
  border:1px solid white;
  background:transparent;
  color:white;
  border-radius:25px;
}
</style>
</head>

<body>

<div class="sky" id="sky">

  <!-- 🌳 درخت‌ها -->
  <div class="tree" style="left:5%">🌳</div>
  <div class="tree" style="left:25%">🌳</div>
  <div class="tree" style="left:60%">🌳</div>
  <div class="tree" style="left:80%">🌳</div>

</div>

<div class="title" id="t">
اینجا باغیست که خاطره‌ها در آن رشد کرده‌اند...
</div>

<button class="btn" onclick="next()">💌 ادامه مسیر</button>

<script>

const sky=document.getElementById("sky");

const messages=[
"امروز بهترین روز زندگی من است.",
"تو برای من ارزشمندترینی.",
"تو معجزه زندگی منی.",
"آسمان به افتخار تو می‌درخشد."
];

/* 🍓 توت‌فرنگی‌ها */
for(let i=0;i<16;i++){
  let b=document.createElement("div");
  b.className="berry";
  b.innerHTML="🍓";

  b.style.top=Math.random()*70+"%";
  b.style.left=Math.random()*100+"%";

  b.onclick=()=>{
    alert(messages[Math.floor(Math.random()*messages.length)]);
  };

  sky.appendChild(b);
}

/* متن */
setTimeout(()=>{
  document.getElementById("t").style.opacity=1;
},700);

/* رفتن */
function next(){
  window.location.href="page4.html";
}

</script>

</body>
</html>
