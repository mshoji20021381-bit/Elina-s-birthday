<button class="btn" onclick="goNext()">
✨ ورود ✨
</button>

<script>

const sky=document.getElementById("sky");

/* ⭐ ستاره‌ها */
for(let i=0;i<350;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.top=Math.random()*100+"%";
  s.style.left=Math.random()*100+"%";
  sky.appendChild(s);
}

/* 🍓 */
for(let i=0;i<8;i++){
  let b=document.createElement("div");
  b.className="berry";
  b.innerHTML="🍓";

  b.style.top=Math.random()*100+"%";
  b.style.left=Math.random()*100+"%";

  b.onclick=()=>{
    b.style.transform="scale(1.3)";
    setTimeout(()=>b.style.transform="scale(1)",300);
  };

  sky.appendChild(b);
}

/* متن‌ها */
let texts=["t1","t2","t3","t4"];
let i=0;

function show(){
  if(i<texts.length){
    let el=document.getElementById(texts[i]);
    el.style.opacity=1;

    setTimeout(()=>{
      el.style.opacity=0;
      i++;
      show();
    },2000);

  } else {
    document.getElementById("elina").style.opacity=1;
  }
}

show();

/* دکمه ورود */
function goNext(){
    window.location.href = "page2.html";
}

</script>
